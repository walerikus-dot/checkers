version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-checkers_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_db_password}
      POSTGRES_DB: ${POSTGRES_DB:-checkers}
    volumes:
      - pgdata:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-checkers_user} -d ${POSTGRES_DB:-checkers}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme_redis_password}
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme_redis_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Full backend — handles REST API + /guest namespace (relay) + /game namespace (auth play)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - BACKEND_PORT=3001
      - DB_HOST=postgres
      - DB_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-checkers_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme_db_password}
      - POSTGRES_DB=${POSTGRES_DB:-checkers}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-changeme_redis_password}@redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-changeme_redis_password}
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET:-changeme_jwt_access_secret_min32chars}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-changeme_jwt_refresh_secret_min32chars}
      - JWT_ACCESS_EXPIRES=15m
      - JWT_REFRESH_EXPIRES=7d
      - FRONTEND_URL=${FRONTEND_URL:-https://chashki.duckdns.org}
      - GAME_CLIENT_URL=${GAME_CLIENT_URL:-https://chashki.duckdns.org/checkers-final.html}
      - API_URL=${API_URL:-https://chashki.duckdns.org}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - DB_SYNC=${DB_SYNC:-false}
      - BUG_REPORTS_DIR=/opt/checkers/bug-reports
      - ADMIN_SECRET=${ADMIN_SECRET:-checkers-admin-2026}
    volumes:
      - /opt/checkers/bug-reports:/opt/checkers/bug-reports
    expose:
      - "3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Next.js frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - HOSTNAME=0.0.0.0

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/html:/usr/share/nginx/html:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend

volumes:
  pgdata:
