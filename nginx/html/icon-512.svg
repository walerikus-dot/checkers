<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="80" fill="#0a0a10"/>
  <!-- 4x4 mini checkerboard -->
  <g transform="translate(76,76)">
    <rect x="0" y="0" width="90" height="90" fill="#2a2a3a"/>
    <rect x="90" y="0" width="90" height="90" fill="#1a1a28"/>
    <rect x="180" y="0" width="90" height="90" fill="#2a2a3a"/>
    <rect x="270" y="0" width="90" height="90" fill="#1a1a28"/>
    <rect x="0" y="90" width="90" height="90" fill="#1a1a28"/>
    <rect x="90" y="90" width="90" height="90" fill="#2a2a3a"/>
    <rect x="180" y="90" width="90" height="90" fill="#1a1a28"/>
    <rect x="270" y="90" width="90" height="90" fill="#2a2a3a"/>
    <rect x="0" y="180" width="90" height="90" fill="#2a2a3a"/>
    <rect x="90" y="180" width="90" height="90" fill="#1a1a28"/>
    <rect x="180" y="180" width="90" height="90" fill="#2a2a3a"/>
    <rect x="270" y="180" width="90" height="90" fill="#1a1a28"/>
    <rect x="0" y="270" width="90" height="90" fill="#1a1a28"/>
    <rect x="90" y="270" width="90" height="90" fill="#2a2a3a"/>
    <rect x="180" y="270" width="90" height="90" fill="#1a1a28"/>
    <rect x="270" y="270" width="90" height="90" fill="#2a2a3a"/>
  </g>
  <!-- Checker piece -->
  <circle cx="256" cy="256" r="100" fill="#7c5cfc" opacity="0.9"/>
  <circle cx="256" cy="256" r="78" fill="none" stroke="#a78bfa" stroke-width="4" opacity="0.6"/>
  <!-- Crown -->
  <path d="M206 270 L218 230 L238 254 L256 216 L274 254 L294 230 L306 270 Z" fill="#f5f0e8" opacity="0.9"/>
</svg>
