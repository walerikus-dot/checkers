events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    gzip          on;
    gzip_types    text/plain text/css application/javascript application/json;

    # Use Docker's internal DNS for lazy upstream resolution
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Redirect all HTTP → HTTPS
    server {
        listen 80;
        server_name chashki.duckdns.org;
        return 301 https://$host$request_uri;
    }

    # HTTPS server
    server {
        listen 443 ssl;
        server_name chashki.duckdns.org _;

        ssl_certificate     /etc/letsencrypt/live/chashki.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/chashki.duckdns.org/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # REST API → full NestJS backend
        location /api/ {
            set $backend_host backend:3001;
            proxy_pass         http://$backend_host;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
            client_max_body_size 1m;
        }

        # WebSocket + socket.io → backend (handles /guest and /game namespaces)
        location /socket.io/ {
            set $backend_host backend:3001;
            proxy_pass         http://$backend_host;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 86400s;
        }

        # Next.js app routes — explicit path prefixes only
        location ~* ^/(dashboard|auth|profile|history|replay|friends|leaderboard|tournaments|play|_next|__nextjs) {
            set $frontend_host frontend:3001;
            proxy_pass         http://$frontend_host;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # Root and everything else → HTML game (original behavior)
        location / {
            root  /usr/share/nginx/html;
            index checkers-final.html;
            try_files $uri $uri/ /checkers-final.html;
        }
    }
}
